version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: truth-dare-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save "" --appendonly no

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: truth-dare-server
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=5000
      - SERVER_HOST=0.0.0.0
    depends_on:
      - redis
    restart: unless-stopped
