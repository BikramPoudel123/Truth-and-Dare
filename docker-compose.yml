version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: truth-dare-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000 --requirepass truthdare_dev_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "truthdare_dev_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: truth-dare-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=truthdare_dev_redis
      - SERVER_PORT=5000
      - SERVER_HOST=0.0.0.0
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX_REQUESTS=120
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

volumes:
  redis_data:
  uploads_data:
