version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: truth-dare-redis-prod
    restart: always
    command: redis-server --appendonly yes --save 60 1000 --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: truth-dare-server-prod
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=5000
      - SERVER_HOST=0.0.0.0
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=60
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_prod_data:/app/uploads
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: truth-dare-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - server
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: truth-dare-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - backend

volumes:
  redis_prod_data:
  uploads_prod_data:

networks:
  backend:
    driver: bridge
